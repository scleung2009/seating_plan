<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課室調位工具</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #d1d5db;
      --seat: #eef2ff;
      --seat-border: #c7d2fe;
      --empty: #f9fafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      padding: 28px 20px;
      text-align: center;
    }

    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; opacity: 0.9; }

    main {
      max-width: 1240px;
      margin: 24px auto;
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .panel, .classroom {
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }

    h2 { margin: 0 0 14px; font-size: 20px; }

    label {
      display: block;
      font-weight: 600;
      margin: 14px 0 6px;
    }

    input, textarea, select, button { font-family: inherit; font-size: 15px; }

    input[type="number"], textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: white;
    }

    textarea { min-height: 120px; resize: vertical; }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #f9fafb;
    }

    .btns { display: grid; gap: 10px; margin-top: 16px; }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 700;
      transition: 0.15s;
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { background: #e5e7eb; color: #111827; }
    button.secondary:hover { background: #d1d5db; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }

    .hint { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 8px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }

    .stat {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat strong { display: block; font-size: 22px; color: var(--primary); }

    .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .board-wrap { overflow-x: auto; padding-bottom: 8px; }

    .teacher-desk {
      margin: 0 auto 20px;
      width: 220px;
      text-align: center;
      padding: 12px;
      background: #111827;
      color: white;
      border-radius: 14px;
      font-weight: 700;
    }

    .seat-grid { display: grid; gap: 12px; min-width: 520px; }

    .seat {
      min-height: 82px;
      border: 2px solid var(--seat-border);
      background: var(--seat);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      position: relative;
      line-height: 1.3;
    }

    .seat.empty { background: var(--empty); color: #9ca3af; border-style: dashed; font-weight: 500; }
    .seat.drag-over { outline: 3px solid #f59e0b; outline-offset: 2px; }
    .seat small.pos { position: absolute; top: 5px; left: 8px; color: #6b7280; font-size: 11px; font-weight: 500; }
    .seat .eng { color: #4b5563; font-size: 11px; font-weight: 500; margin-top: 4px; }

    .student-list {
      margin-top: 14px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px;
      background: #f9fafb;
    }

    .student-chip {
      display: inline-block;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 5px 9px;
      margin: 4px;
      font-size: 13px;
    }

    @media print {
      body { background: white; }
      header, .panel, .toolbar, .stats { display: none !important; }
      main { display: block; max-width: none; margin: 0; padding: 0; }
      .classroom { box-shadow: none; padding: 0; }
      .seat { break-inside: avoid; }
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>課室調位工具</h1>
    <p>讀取 Excel 學生名單、選擇班別、自動排位、拖拉調位、匯出座位表</p>
  </header>

  <main>
    <section class="panel">
      <h2>設定及匯入</h2>

      <label for="fileInput">匯入學生名單附件</label>
      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.txt" />
      <div class="hint">支援你附件的 Excel 格式：S1–S6 工作表，每頁有 A/B/C/D 班。亦支援 CSV / TXT。</div>

      <label for="classSelect">選擇班別</label>
      <select id="classSelect" disabled>
        <option value="">請先匯入 Excel 檔</option>
      </select>

      <label for="nameInput">或直接貼上學生名單</label>
      <textarea id="nameInput" placeholder="例如：&#10;陳大文&#10;李美玲&#10;Chan Tai Man&#10;Wong Mei Ling"></textarea>

      <label>課室座位</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div>
          <label for="rows" style="margin-top:0;">行數</label>
          <input id="rows" type="number" min="1" max="12" value="5" />
        </div>
        <div>
          <label for="cols" style="margin-top:0;">每行座位數</label>
          <input id="cols" type="number" min="1" max="12" value="6" />
        </div>
      </div>

      <label for="mode">自動排位方式</label>
      <select id="mode">
        <option value="order">按學號 / 名單次序</option>
        <option value="random">隨機排位</option>
      </select>

      <div class="btns">
        <button onclick="loadNamesFromTextarea()">載入貼上名單</button>
        <button onclick="generateSeats()">產生座位表</button>
        <button class="secondary" onclick="shuffleSeats()">重新隨機調位</button>
        <button class="secondary" onclick="exportCSV()">匯出 CSV 座位表</button>
        <button class="secondary" onclick="window.print()">列印 / 另存 PDF</button>
        <button class="danger" onclick="resetAll()">清除全部</button>
      </div>

      <div class="student-list" id="studentList">尚未載入學生</div>
    </section>

    <section class="classroom">
      <div class="toolbar">
        <h2 id="boardTitle">座位表</h2>
        <div class="hint">提示：可拖拉學生到另一個座位交換位置</div>
      </div>

      <div class="stats">
        <div class="stat"><strong id="studentCount">0</strong>學生</div>
        <div class="stat"><strong id="seatCount">30</strong>座位</div>
        <div class="stat"><strong id="emptyCount">30</strong>空位</div>
      </div>

      <div class="teacher-desk">黑板 / 教師桌</div>
      <div class="board-wrap">
        <div id="seatGrid" class="seat-grid"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    let students = [];
    let seats = [];
    let draggedIndex = null;
    let classes = {};
    let currentClassName = '';

    const fileInput = document.getElementById('fileInput');
    const classSelect = document.getElementById('classSelect');
    const nameInput = document.getElementById('nameInput');
    const rowsInput = document.getElementById('rows');
    const colsInput = document.getElementById('cols');
    const modeInput = document.getElementById('mode');
    const seatGrid = document.getElementById('seatGrid');
    const studentList = document.getElementById('studentList');
    const boardTitle = document.getElementById('boardTitle');

    fileInput.addEventListener('change', handleFile);
    classSelect.addEventListener('change', loadSelectedClass);
    rowsInput.addEventListener('change', updateSeatCountOnly);
    colsInput.addEventListener('change', updateSeatCountOnly);

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'xlsx' || ext === 'xls') {
        if (typeof XLSX === 'undefined') {
          alert('未能載入 Excel 讀取器。請確認電腦已連接網絡，或改用 CSV / TXT。');
          return;
        }
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        classes = extractClassesFromWorkbook(workbook);
        populateClassSelect();
        const firstClass = Object.keys(classes)[0];
        if (firstClass) {
          classSelect.value = firstClass;
          loadSelectedClass();
        } else {
          alert('未能在 Excel 中找到學生名單。請確認格式是否為：第一行班別，第二行學號 / 中文姓名 / 英文姓名 / 性別。');
        }
      } else {
        const text = await file.text();
        nameInput.value = text;
        loadNamesFromTextarea();
      }
    }

    function extractClassesFromWorkbook(workbook) {
      const result = {};
      workbook.SheetNames.forEach(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        if (rows.length < 3) return;

        const firstRow = rows[0];
        for (let startCol = 0; startCol < firstRow.length; startCol++) {
          const className = String(firstRow[startCol] || '').trim();
          if (!/^\d+[A-Z]$/i.test(className)) continue;

          const header = rows[1] || [];
          const chiCol = findHeaderCol(header, startCol, ['中文姓名', '中文名姓']);
          const engCol = findHeaderCol(header, startCol, ['英文姓名', '英文名姓']);
          const noCol = findHeaderCol(header, startCol, ['學號']);
          const genderCol = findHeaderCol(header, startCol, ['性別']);
          if (chiCol === -1 && engCol === -1) continue;

          const list = [];
          for (let r = 2; r < rows.length; r++) {
            const row = rows[r] || [];
            const chineseName = String(row[chiCol] || '').trim();
            const englishName = String(row[engCol] || '').trim();
            const classNo = String(row[noCol] || '').trim();
            const gender = String(row[genderCol] || '').trim();
            if (!chineseName && !englishName) continue;
            list.push({ className, classNo, chineseName, englishName, gender });
          }

          if (list.length > 0) result[className] = list;
        }
      });
      return result;
    }

    function findHeaderCol(header, startCol, names) {
      for (let c = startCol; c < startCol + 4; c++) {
        const value = String(header[c] || '').trim();
        if (names.includes(value)) return c;
      }
      return -1;
    }

    function populateClassSelect() {
      const classNames = Object.keys(classes).sort(naturalClassSort);
      classSelect.innerHTML = '';
      if (classNames.length === 0) {
        classSelect.disabled = true;
        classSelect.innerHTML = '<option value="">沒有找到班別</option>';
        return;
      }
      classNames.forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = `${name}（${classes[name].length}人）`;
        classSelect.appendChild(option);
      });
      classSelect.disabled = false;
    }

    function naturalClassSort(a, b) {
      const ma = a.match(/^(\d+)([A-Z])$/i);
      const mb = b.match(/^(\d+)([A-Z])$/i);
      if (!ma || !mb) return a.localeCompare(b);
      return Number(ma[1]) - Number(mb[1]) || ma[2].localeCompare(mb[2]);
    }

    function loadSelectedClass() {
      currentClassName = classSelect.value;
      students = [...(classes[currentClassName] || [])];
      nameInput.value = students.map(s => `${s.classNo ? s.classNo + '. ' : ''}${s.chineseName}${s.englishName ? ' / ' + s.englishName : ''}`).join('\n');
      seats = [];
      renderStudentList();
      renderSeats();
      updateStats();
      updateTitle();
    }

    function parseNames(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const cells = line.split(',').map(c => c.trim()).filter(Boolean);
          const raw = cells[0] || line;
          const cleaned = raw.replace(/^\d+[.)、\s]+/, '').trim();
          return { classNo: String(index + 1).padStart(2, '0'), chineseName: cleaned, englishName: '', gender: '' };
        })
        .filter(s => s.chineseName && !/^name$|^姓名$|^學生姓名$/i.test(s.chineseName));
    }

    function loadNamesFromTextarea() {
      currentClassName = '自訂名單';
      students = parseNames(nameInput.value);
      seats = [];
      renderStudentList();
      renderSeats();
      updateStats();
      updateTitle();
      if (students.length === 0) alert('未能讀取學生姓名。請確認名單格式是否正確。');
    }

    function renderStudentList() {
      if (students.length === 0) {
        studentList.textContent = '尚未載入學生';
        return;
      }
      studentList.innerHTML = students.map(s => `<span class="student-chip">${escapeHTML(formatStudentShort(s))}</span>`).join('');
    }

    function generateSeats() {
      if (students.length === 0) loadNamesFromTextarea();
      const rows = Number(rowsInput.value);
      const cols = Number(colsInput.value);
      const total = rows * cols;
      let list = [...students];
      if (modeInput.value === 'random') list = shuffleArray(list);
      seats = Array.from({ length: total }, (_, i) => list[i] || null);
      renderSeats();
      updateStats();
      updateTitle();
    }

    function shuffleSeats() {
      if (students.length === 0) loadNamesFromTextarea();
      const rows = Number(rowsInput.value);
      const cols = Number(colsInput.value);
      const total = rows * cols;
      const list = shuffleArray([...students]);
      seats = Array.from({ length: total }, (_, i) => list[i] || null);
      renderSeats();
      updateStats();
      updateTitle();
    }

    function renderSeats() {
      const rows = Number(rowsInput.value);
      const cols = Number(colsInput.value);
      const total = rows * cols;
      if (seats.length !== total) seats = Array.from({ length: total }, (_, i) => seats[i] || null);
      seatGrid.style.gridTemplateColumns = `repeat(${cols}, minmax(96px, 1fr))`;
      seatGrid.innerHTML = '';

      seats.forEach((student, index) => {
        const seat = document.createElement('div');
        seat.className = 'seat' + (student ? '' : ' empty');
        seat.draggable = true;
        seat.dataset.index = index;
        seat.innerHTML = student ? seatStudentHTML(student, index, cols) : `<small class="pos">${seatLabel(index, cols)}</small>空位`;

        seat.addEventListener('dragstart', () => { draggedIndex = index; });
        seat.addEventListener('dragover', e => { e.preventDefault(); seat.classList.add('drag-over'); });
        seat.addEventListener('dragleave', () => seat.classList.remove('drag-over'));
        seat.addEventListener('drop', e => {
          e.preventDefault();
          seat.classList.remove('drag-over');
          const targetIndex = Number(seat.dataset.index);
          if (draggedIndex === null || draggedIndex === targetIndex) return;
          [seats[draggedIndex], seats[targetIndex]] = [seats[targetIndex], seats[draggedIndex]];
          draggedIndex = null;
          renderSeats();
          updateStats();
        });

        seatGrid.appendChild(seat);
      });
    }

    function seatStudentHTML(student, index, cols) {
      return `<small class="pos">${seatLabel(index, cols)}</small><div>${escapeHTML(student.classNo ? student.classNo + ' ' + student.chineseName : student.chineseName)}</div>${student.englishName ? `<div class="eng">${escapeHTML(student.englishName)}</div>` : ''}`;
    }

    function formatStudentShort(s) {
      return `${s.classNo ? s.classNo + ' ' : ''}${s.chineseName || s.englishName}`;
    }

    function seatLabel(index, cols) {
      const row = Math.floor(index / cols) + 1;
      const col = (index % cols) + 1;
      return `${row}-${col}`;
    }

    function updateStats() {
      const rows = Number(rowsInput.value);
      const cols = Number(colsInput.value);
      const total = rows * cols;
      const occupied = seats.filter(Boolean).length;
      document.getElementById('studentCount').textContent = students.length;
      document.getElementById('seatCount').textContent = total;
      document.getElementById('emptyCount').textContent = Math.max(total - occupied, 0);
    }

    function updateTitle() {
      boardTitle.textContent = currentClassName ? `${currentClassName} 座位表` : '座位表';
    }

    function updateSeatCountOnly() {
      updateStats();
      if (seats.length > 0) renderSeats();
    }

    function exportCSV() {
      if (seats.length === 0) {
        alert('請先產生座位表。');
        return;
      }
      const rows = Number(rowsInput.value);
      const cols = Number(colsInput.value);
      let csv = '\uFEFF';
      csv += `${currentClassName || ''}座位表\n`;
      csv += '位置,學號,中文姓名,英文姓名,性別\n';

      for (let i = 0; i < seats.length; i++) {
        const s = seats[i];
        csv += [seatLabel(i, cols), s?.classNo || '', s?.chineseName || '空位', s?.englishName || '', s?.gender || ''].map(csvEscape).join(',') + '\n';
      }

      csv += '\n課室格式\n';
      for (let r = 0; r < rows; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) {
          const s = seats[r * cols + c];
          row.push(csvEscape(s ? `${s.classNo ? s.classNo + ' ' : ''}${s.chineseName}` : '空位'));
        }
        csv += row.join(',') + '\n';
      }

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentClassName || '自訂'}_座位表_${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function resetAll() {
      if (!confirm('確定要清除全部資料？')) return;
      students = [];
      seats = [];
      classes = {};
      currentClassName = '';
      nameInput.value = '';
      fileInput.value = '';
      classSelect.innerHTML = '<option value="">請先匯入 Excel 檔</option>';
      classSelect.disabled = true;
      renderStudentList();
      renderSeats();
      updateStats();
      updateTitle();
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function escapeHTML(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      if (/[",\n]/.test(str)) return '"' + str.replaceAll('"', '""') + '"';
      return str;
    }

    renderSeats();
    updateStats();
  </script>
</body>
</html>
